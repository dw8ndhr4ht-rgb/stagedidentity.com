<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staged Identity</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Instrument+Serif:ital@0;1&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1f12;overflow:hidden;height:100vh;width:100vw}

/* Static camo base layer - painted by JS once */
#camo-static{position:fixed;top:0;left:0;right:0;bottom:0;z-index:0}

/* Sun rays behind camo */
#sun{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1}

/* Falling leaves layer */
#leaves{position:fixed;top:0;left:0;right:0;bottom:0;z-index:2;pointer-events:none}

/* Holes mask - reveals sun through fallen patches */
#holes{position:fixed;top:0;left:0;right:0;bottom:0;z-index:3}

#camo-static canvas,#sun canvas,#leaves canvas,#holes canvas{width:100%;height:100%}

.center-ui{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;pointer-events:none}

.iran-btn{
  pointer-events:all;text-decoration:none;position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:24px 56px;
  background:#1a1f12;
  border:4px solid #0e1209;
  box-shadow:6px 6px 0 #0e1209;
  transition:all .2s;
  cursor:pointer;
}
.iran-btn:hover{
  transform:translate(-3px,-3px);
  box-shadow:9px 9px 0 #0e1209;
  background:#222a16;
}
.iran-btn:active{
  transform:translate(3px,3px);
  box-shadow:3px 3px 0 #0e1209;
}
.btn-text{
  font-family:'Playfair Display',serif;
  font-size:56px;
  font-weight:900;
  font-style:italic;
  color:#f0d848;
  letter-spacing:.06em;
  text-transform:uppercase;
  text-shadow:3px 3px 0 #0e1209,-1px -1px 0 #0e1209,1px -1px 0 #0e1209,-1px 1px 0 #0e1209;
}
.btn-sub{
  position:absolute;
  bottom:-28px;
  font-family:'Playfair Display',serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:#8a9a5a;
  text-shadow:2px 2px 0 #0e1209;
}
</style>
</head>
<body>

<div id="camo-static"><canvas id="cv-camo"></canvas></div>
<div id="sun"><canvas id="cv-sun"></canvas></div>
<div id="holes"><canvas id="cv-holes"></canvas></div>
<div id="leaves"><canvas id="cv-leaves"></canvas></div>

<div class="center-ui">
  <a class="iran-btn" href="./iran/">
    <span class="btn-text">Iran</span>
  </a>
</div>

<script>
var W,H,dpr=devicePixelRatio;
var cvCamo=document.getElementById('cv-camo');
var cxCamo=cvCamo.getContext('2d');
var cvSun=document.getElementById('cv-sun');
var cxSun=cvSun.getContext('2d');
var cvHoles=document.getElementById('cv-holes');
var cxHoles=cvHoles.getContext('2d');
var cvLeaves=document.getElementById('cv-leaves');
var cxLeaves=cvLeaves.getContext('2d');

var COLORS=['#2d3a1f','#4a5a2e','#3b4a28','#1e2a14','#5c6b3a','#2a2a1a','#3d4e2a','#5a4a30','#1a1f12','#6b7a4a','#3a3020','#4e5e30'];
var patches=[];
var sunAngle=0;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  [cvCamo,cvSun,cvHoles,cvLeaves].forEach(function(c){
    c.width=W*dpr;c.height=H*dpr;
    c.getContext('2d').setTransform(dpr,0,0,dpr,0,0);
  });
}

function makePath(cx,pts){
  cx.beginPath();
  cx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length;i++){
    var p=pts[i-1],c=pts[i];
    cx.quadraticCurveTo(p.x,p.y,(p.x+c.x)/2,(p.y+c.y)/2);
  }
  var last=pts[pts.length-1],first=pts[0];
  cx.quadraticCurveTo(last.x,last.y,(last.x+first.x)/2,(last.y+first.y)/2);
  cx.closePath();
}

function genPatches(){
  patches=[];
  var size=55;
  var cols=Math.ceil(W/size)+3;
  var rows=Math.ceil(H/size)+3;
  for(var row=0;row<rows;row++){
    for(var col=0;col<cols;col++){
      var bx=col*size-size*1.5+(row%2)*size*.5;
      var by=row*size-size*1.5;
      var pts=[];
      var np=5+Math.floor(Math.random()*5);
      var r=size*(.45+Math.random()*.45);
      for(var p=0;p<np;p++){
        var a=(p/np)*Math.PI*2;
        var pr=r*(.6+Math.random()*.7);
        pts.push({
          x:Math.cos(a)*pr+(Math.random()-.5)*size*.35,
          y:Math.sin(a)*pr+(Math.random()-.5)*size*.35
        });
      }
      patches.push({
        x:bx+(Math.random()-.5)*size*.4,
        y:by+(Math.random()-.5)*size*.4,
        pts:pts,
        col:COLORS[Math.floor(Math.random()*COLORS.length)],
        // Comic outline
        outline:Math.random()>.6,
        // Fall properties
        delay:0,
        fs:50+Math.random()*90,
        rot:0,
        rs:(Math.random()-.5)*3,
        sa:15+Math.random()*50,
        sf:.4+Math.random()*1.8,
        phase:Math.random()*Math.PI*2,
        falling:false,
        fallen:false,
        ft:0,
        alpha:1,
        // For leaf: copy of original position
        ox:0,oy:0
      });
    }
  }
  // Randomize fall order
  var order=patches.slice();
  order.sort(function(){return Math.random()-.5;});
  order.forEach(function(p,i){
    p.delay=2+(i/order.length)*30+Math.random()*4;
  });
  // Set original positions
  patches.forEach(function(p){p.ox=p.x;p.oy=p.y;});
}

// Paint static camo once
function paintCamo(){
  // Fill base
  cxCamo.fillStyle='#1a1f12';
  cxCamo.fillRect(0,0,W,H);
  // Draw all patches
  patches.forEach(function(p){
    cxCamo.save();
    cxCamo.translate(p.x,p.y);
    makePath(cxCamo,p.pts);
    cxCamo.fillStyle=p.col;
    cxCamo.fill();
    if(p.outline){
      cxCamo.strokeStyle='rgba(10,10,5,.35)';
      cxCamo.lineWidth=1.5;
      cxCamo.stroke();
    }
    cxCamo.restore();
  });
}

// Comic sun rays
function drawSun(){
  cxSun.clearRect(0,0,W,H);
  
  // Warm background
  var g=cxSun.createRadialGradient(W*.5,-H*.05,0,W*.5,-H*.05,H*1.3);
  g.addColorStop(0,'#fff8d0');
  g.addColorStop(0.15,'#ffe870');
  g.addColorStop(0.35,'#f0c030');
  g.addColorStop(0.6,'#d09018');
  g.addColorStop(1,'#1a1508');
  cxSun.fillStyle=g;
  cxSun.fillRect(0,0,W,H);
  
  // Comic rays - bold alternating
  cxSun.save();
  cxSun.translate(W*.5,-H*.05);
  var rayCount=24;
  for(var i=0;i<rayCount;i++){
    var a1=(i/rayCount)*Math.PI*2+sunAngle;
    var a2=((i+.5)/rayCount)*Math.PI*2+sunAngle;
    var len=H*2.5;
    cxSun.beginPath();
    cxSun.moveTo(0,0);
    cxSun.lineTo(Math.cos(a1)*len,Math.sin(a1)*len);
    cxSun.lineTo(Math.cos(a2)*len,Math.sin(a2)*len);
    cxSun.closePath();
    cxSun.fillStyle=i%2===0?'rgba(255,248,180,.18)':'rgba(255,220,60,.08)';
    cxSun.fill();
  }
  cxSun.restore();
  
  // Comic halftone dots near center
  cxSun.save();
  cxSun.globalAlpha=.06;
  for(var dx=0;dx<W;dx+=12){
    for(var dy=0;dy<H;dy+=12){
      var dist=Math.sqrt((dx-W*.5)*(dx-W*.5)+(dy+H*.05)*(dy+H*.05));
      var r=Math.max(0,3-dist/(H*.4)*3);
      if(r>0.3){
        cxSun.beginPath();
        cxSun.arc(dx,dy,r,0,Math.PI*2);
        cxSun.fillStyle='#000';
        cxSun.fill();
      }
    }
  }
  cxSun.restore();
  
  sunAngle+=0.0008;
}

// Draw holes in camo (where patches have fallen)
function drawHoles(){
  // Fill entire screen with camo color, then cut out holes
  cxHoles.clearRect(0,0,W,H);
  cxHoles.fillStyle='#1a1f12';
  cxHoles.fillRect(0,0,W,H);
  
  // Cut out fallen patches to reveal sun beneath
  cxHoles.globalCompositeOperation='destination-out';
  patches.forEach(function(p){
    if(!p.falling&&!p.fallen)return;
    // Reveal this spot
    var progress=p.fallen?1:Math.min(1,p.ft*2);
    cxHoles.save();
    cxHoles.translate(p.ox,p.oy);
    cxHoles.globalAlpha=progress;
    makePath(cxHoles,p.pts);
    cxHoles.fill();
    cxHoles.restore();
  });
  cxHoles.globalCompositeOperation='source-over';
}

// Draw falling leaves
function drawLeaves(){
  cxLeaves.clearRect(0,0,W,H);
  patches.forEach(function(p){
    if(!p.falling||p.fallen)return;
    cxLeaves.save();
    cxLeaves.translate(p.x,p.y);
    cxLeaves.rotate(p.rot);
    cxLeaves.globalAlpha=p.alpha;
    
    makePath(cxLeaves,p.pts);
    cxLeaves.fillStyle=p.col;
    cxLeaves.fill();
    
    // Comic outline on falling leaves
    cxLeaves.strokeStyle='rgba(10,10,5,.5)';
    cxLeaves.lineWidth=2;
    cxLeaves.stroke();
    
    cxLeaves.restore();
  });
}

var startTime=Date.now();
function update(){
  var elapsed=(Date.now()-startTime)/1000;
  
  patches.forEach(function(p){
    if(p.fallen)return;
    if(!p.falling&&elapsed>p.delay){
      p.falling=true;
      p.ft=0;
    }
    if(p.falling){
      p.ft+=1/60;
      // Leaf physics: gravity + sway + wobble
      p.y=p.oy+p.ft*p.fs+p.ft*p.ft*20;
      p.x=p.ox+Math.sin(p.ft*p.sf+p.phase)*p.sa;
      p.rot+=p.rs*(1/60);
      p.alpha=Math.max(0,1-p.ft*.25);
      if(p.y>H+120||p.alpha<=0){
        p.fallen=true;
      }
    }
  });
}

function frame(){
  update();
  drawSun();
  drawHoles();
  drawLeaves();
  requestAnimationFrame(frame);
}

function init(){
  resize();
  genPatches();
  paintCamo();
  frame();
}

window.addEventListener('resize',function(){
  resize();
  genPatches();
  paintCamo();
  startTime=Date.now();
});

init();
</script>
</body>
</html>
